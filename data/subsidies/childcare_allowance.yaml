version: "2026.03"
last_verified: "2026-03-18"
description: "育兒津貼（0-5歲，自行照顧或私立幼兒園）"

# Central government base amounts (monthly, NTD)
# Applies when parents care for child themselves or use non-subsidized childcare
central:
  base_amounts:
    - birth_order: 1
      monthly: 5000
    - birth_order: 2
      monthly: 7000
    - birth_order: 3
      monthly: 7000
      note: "Third child and above"

  eligibility:
    max_age_years: 5
    income_tax_rate_limit: 20
    conditions:
      - "Not using public or quasi-public childcare services"
      - "Child is under 5 years old"
      - "Household income tax rate below 20%"

# City-level additional subsidies (monthly, NTD)
